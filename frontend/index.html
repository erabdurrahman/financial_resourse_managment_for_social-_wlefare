<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinWelfare – Financial Resource Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Login page specific overrides ── */
    body.login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .particles-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: floatUp linear infinite;
      opacity: 0.15;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) scale(1);   opacity: 0.15; }
      100% { transform: translateY(-10vh) scale(1.3); opacity: 0; }
    }
    .auth-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      margin: 1rem;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo .logo-icon {
      width: 64px;
      height: 64px;
      background: var(--glass-bg);
      border: 2px solid var(--glass-border);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 0.75rem;
      backdrop-filter: blur(10px);
    }
    .auth-logo h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }
    .auth-logo p {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }
    .auth-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }
    .tab-buttons {
      display: flex;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 2rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      box-shadow: 0 4px 15px rgba(102,126,234,0.4);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
    .form-group {
      margin-bottom: 1.25rem;
      position: relative;
    }
    .form-group label {
      display: block;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group .input-wrap {
      position: relative;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      box-sizing: border-box;
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.35); }
    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(102,126,234,0.25);
    }
    .form-group select option { background: #302b63; color: #fff; }
    .toggle-pw {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0;
      line-height: 1;
    }
    .toggle-pw:hover { color: #fff; }
    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      margin-top: 0.5rem;
      position: relative;
      overflow: hidden;
    }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102,126,234,0.45);
    }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }
    .btn-submit .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    .btn-submit.loading .btn-text { display: none; }
    .btn-submit.loading .spinner  { display: block; }
    .error-msg {
      color: #ff6b8a;
      font-size: 0.83rem;
      margin-top: 0.9rem;
      text-align: center;
      min-height: 1.2em;
      animation: fadeIn 0.3s ease;
    }
    .input-pw { padding-right: 2.8rem !important; }
  </style>
</head>
<body class="login-page">

  <!-- Animated particle background -->
  <div class="particles-bg" id="particles"></div>

  <div class="auth-wrapper">
    <!-- Logo / Branding -->
    <div class="auth-logo">
      <div class="logo-icon">💰</div>
      <h1>FinWelfare</h1>
      <p>Financial Resource Management for Social Welfare</p>
    </div>

    <!-- Auth Card -->
    <div class="auth-card">
      <!-- Tab switcher -->
      <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn"        onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <div class="tab-content active" id="tab-login">
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <input type="password" id="loginPassword" class="input-pw" placeholder="••••••••" required />
              <button type="button" class="toggle-pw" onclick="togglePw('loginPassword', this)">👁</button>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="loginBtn">
            <span class="btn-text">Sign In</span>
            <span class="spinner"></span>
          </button>
          <div class="error-msg" id="loginError"></div>
        </form>
      </div>

      <!-- Register Form -->
      <div class="tab-content" id="tab-register">
        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="regEmail" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <input type="password" id="regPassword" class="input-pw" placeholder="Min. 6 characters" required minlength="6" />
              <button type="button" class="toggle-pw" onclick="togglePw('regPassword', this)">👁</button>
            </div>
          </div>
          <div class="form-group">
            <label>Role</label>
            <select id="regRole" required>
              <option value="" disabled selected>Select your role…</option>
              <option value="donor">Donor</option>
              <option value="beneficiary">Beneficiary</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <button type="submit" class="btn-submit" id="registerBtn">
            <span class="btn-text">Create Account</span>
            <span class="spinner"></span>
          </button>
          <div class="error-msg" id="registerError"></div>
        </form>
      </div>
    </div><!-- /.auth-card -->
  </div><!-- /.auth-wrapper -->

  <script src="js/auth.js"></script>
  <script>
    // ── Particle background generator ──
    (function () {
      const container = document.getElementById('particles');
      const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#a78bfa'];
      for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'particle';
        const size = Math.random() * 60 + 20;
        el.style.cssText = `
          width: ${size}px; height: ${size}px;
          left: ${Math.random() * 100}%;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          animation-duration: ${Math.random() * 15 + 10}s;
          animation-delay: ${Math.random() * 10}s;
          filter: blur(${Math.random() * 4 + 1}px);
        `;
        container.appendChild(el);
      }
    })();

    // ── Tab switcher ──
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) =>
        b.classList.toggle('active', (tab === 'login' ? 0 : 1) === i)
      );
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    }

    // ── Show / hide password ──
    function togglePw(inputId, btn) {
      const el = document.getElementById(inputId);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁' : '🙈';
    }
  </script>
</body>
</html>
